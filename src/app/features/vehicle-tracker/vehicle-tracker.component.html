<mat-drawer-container class="h-screen">
  <mat-drawer #drawer opened mode="side" class="overflow-hidden">
    <div class="bg-gray-100 h-screen p-4">
      <app-list-view />
    </div>
  </mat-drawer>
  <mat-drawer-content class="relative overflow-y-hidden!">
    <button
      mat-icon-button
      (click)="drawer.toggle()"
      class="absolute! top-1/2 -translate-y-1/2 z-20!"
    >
      <mat-icon>{{ drawer.opened ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
    <app-map-view />
  </mat-drawer-content>
</mat-drawer-container>
